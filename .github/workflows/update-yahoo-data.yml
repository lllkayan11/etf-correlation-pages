name: Update Yahoo Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Refresh Yahoo JSON data
        run: python fetch_yahoo_etf_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add yahoo_etf_monthly.json yahoo_etf_corr.json yahoo_etf_ohlc.json
          if git diff --staged --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore(data): auto-refresh Yahoo ETF data"
          git push
